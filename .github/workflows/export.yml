# Phase 2503: Web export + CREDITS.md for GitHub Pages (same-origin, no CORS).
# Phase 3250: Add itch.io packaging.
name: Export, Package and Deploy

# 2026-06-09: removed push branches: [main, master] — this workflow has been
# duplicating deploy.yml (which uses the proven barichello/godot-ci image +
# the Godot 4.3 XR-shutdown SIGSEGV workaround). Every push to master fired
# both workflows; this one always crashed at savepack end. Kept tag + manual
# triggers so the itch.io release packaging path stays available when needed.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-export
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3"
    outputs:
      build_dir: export
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot 4.3 and export templates
        run: |
          set -euo pipefail
          VER="${GODOT_VERSION}"
          GODOT_ZIP="Godot_v${VER}-stable_linux.x86_64.zip"
          GODOT_BIN="Godot_v${VER}-stable_linux.x86_64"
          TPZ="Godot_v${VER}-stable_export_templates.tpz"
          BASE="https://github.com/godotengine/godot/releases/download/${VER}-stable"

          wget -q "$BASE/$GODOT_ZIP" -O "$GODOT_ZIP"
          unzip -q "$GODOT_ZIP"
          chmod +x "$GODOT_BIN"
          sudo mv "$GODOT_BIN" /usr/local/bin/godot
          rm -f "$GODOT_ZIP"

          wget -q "$BASE/$TPZ" -O "$TPZ"
          mkdir -p "$HOME/.local/share/godot/export_templates/${VER}.stable"
          unzip -q "$TPZ" -d .
          mv templates/* "$HOME/.local/share/godot/export_templates/${VER}.stable/"
          rm -rf templates "$TPZ"

      - name: Export Web preset
        run: |
          set -euo pipefail
          mkdir -p export
          godot --headless --path . --export-release "Web" export/index.html

      - name: Copy CREDITS.md into export
        run: cp CREDITS.md export/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: export

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: export
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./export

  itch-package:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Package for Itch.io
        run: |
          chmod +x itch_package.py
          ./itch_package.py --source-dir ./build --output-path ./itch-build.zip
      - name: Upload Itch.io package
        uses: actions/upload-artifact@v4
        with:
          name: itch-build
          path: itch-build.zip
