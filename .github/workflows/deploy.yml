name: Deploy HTML5 to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure web templates are installed
        shell: sh
        run: |
          set -eu
          mkdir -p ~/.local/share/godot/export_templates
          ln -sf /root/.local/share/godot/export_templates/4.3.stable \
            ~/.local/share/godot/export_templates/4.3.stable

      - name: Stamp build version
        shell: sh
        run: |
          set -eu
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          STAMP="${SHORT_SHA} $(date -u +%Y-%m-%dT%H:%MZ)"
          echo "${STAMP}" > build_version.txt
          cat build_version.txt

      - name: Export Web release
        # 2026-06-08: Godot 4.3 headless export crashes with SIGSEGV during
        # XR-interface shutdown AFTER savepack has finished and EditorSettings
        # have saved. The actual export files (index.html, .wasm, .pck) DO
        # get written before the crash. Ignore godot's exit code and verify
        # the files as the success signal.
        shell: sh
        run: |
          set -eu
          mkdir -p export
          godot --headless --verbose --export-release "Web" ./export/index.html || true
          ls -la ./export/
          test -f ./export/index.html
          test -f ./export/index.wasm
          test -f ./export/index.pck

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./export
          force_orphan: true
