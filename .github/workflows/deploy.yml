name: Deploy HTML5 to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          include-templates: true
          cache: true

      - name: Export Web release
        run: |
          set -euo pipefail
          mkdir -p export
          godot --headless --export-release "Web" ./export/index.html
          test -f ./export/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./export
          force_orphan: true
