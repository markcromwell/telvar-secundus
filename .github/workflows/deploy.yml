name: Deploy HTML5 to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 2026-06-08: switched from chickensoft-games/setup-godot (which crashed
    # with SIGSEGV after savepack on every Godot version we tried — 4.3.0,
    # 4.4.1, 4.6.3) to the barichello/godot-ci Docker image, which has the
    # export templates pre-installed in the correct location and is
    # widely used for HTML5 CI deploys. The chickensoft action's
    # include-templates: true wasn't placing the web templates where the
    # headless export looked for them.
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure web templates are installed
        # sh in the barichello image rejects 'pipefail' so use plain `-eu`.
        shell: sh
        run: |
          set -eu
          mkdir -p ~/.local/share/godot/export_templates
          # Templates are at /root/.local/share/godot/export_templates in the
          # image; symlink to runner home for the export tool to find them.
          ln -sf /root/.local/share/godot/export_templates/4.3.stable \
            ~/.local/share/godot/export_templates/4.3.stable

- name: Stamp build version        shell: sh        run: |          set -eu          SHORT_SHA=${GITHUB_SHA:0:8}          STAMP="${SHORT_SHA} $(date -u +%Y-%m-%dT%H:%MZ)"          echo "${STAMP}" > build_version.txt          cat build_version.txt
      - name: Export Web release
        # 2026-06-08: Godot 4.3 (and 4.4.1, 4.6.3) headless export reliably
        # crashes with SIGSEGV during XR-interface shutdown AFTER savepack
        # has finished and EditorSettings have saved. The crash is
        # "Index p_index = 1 is out of bounds" at cowdata.h:205 inside the
        # XR cleanup teardown. The actual export files (index.html, .wasm,
        # .pck) DO get written before the crash. Ignore godot's exit code
        # and verify the file as the success signal.
        shell: sh
        run: |
          set -eu
          mkdir -p export
          godot --headless --verbose --export-release "Web" ./export/index.html || true
          ls -la ./export/
          test -f ./export/index.html
          test -f ./export/index.wasm
          test -f ./export/index.pck

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./export
          force_orphan: true
